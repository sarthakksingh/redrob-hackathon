ai_tools_used:
  - "Codex"

ai_usage_summary: |
  Used Codex for architecture, code generation, debugging, README/deck drafting and validation workflow.
  No candidate data is sent to any hosted LLM/API during ranking. The final ranker is deterministic,
  CPU-only, and uses local candidate JSONL input.

methodology_summary: |
  Deterministic recruiter-style ranker for the Senior AI Engineer JD. It streams the 100K JSONL file,
  extracts structured evidence from titles, career history, skills, logistics and Redrob behavioral
  signals, then scores candidates using five components: career evidence, retrieval/ranking/evaluation,
  production/product context, logistics, and engagement. Explicit penalties down-rank nontechnical
  keyword-stuffers, service-only weak fits, inactive candidates and honeypot-like skill inconsistencies.
  The final output is a top-100 CSV/XLSX with specific non-hallucinated reasoning for each candidate.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true

